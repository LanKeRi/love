<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>我们的时间</title>

<style>
body{
    background:#ffe6f0;
    font-family:"Arial";
    text-align:center;
    padding-top:100px;
}

h1{
    color:#ff4d88;
    font-size:40px;
}

#time{
    font-size:30px;
    color:#333;
    margin-top:30px;
}

.heart{
    color:red;
    font-size:30px;
}
</style>

</head>

<body>

<h1>❤️ 我 & 宝宝 ❤️</h1>

<div id="time"></div>

<script>

// 在这里修改你们在一起的日期
var startDate = new Date("2026-03-09 11:28:00");

function updateTime(){

    var now = new Date();

    var diff = now - startDate;

    var days = Math.floor(diff/(1000*60*60*24));
    var hours = Math.floor(diff/(1000*60*60)%24);
    var minutes = Math.floor(diff/(1000*60)%60);
    var seconds = Math.floor(diff/1000%60);

    document.getElementById("time").innerHTML =
    "我们已经在一起<br><br>" +
    "<span class='heart'>❤️</span> " + days + " 天 " +
    hours + " 小时 " +
    minutes + " 分钟 " +
    seconds + " 秒";
}

setInterval(updateTime,1000);

</script>

</body>
</html>
